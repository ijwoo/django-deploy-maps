{% extends 'blog/base.html' %}

{% block title %}{% if edit %}게시글 수정{% else %}새 게시글{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h1 class="text-xl font-bold text-gray-900 mb-6">
            {% if edit %}게시글 수정{% else %}새로운 게시글{% endif %}
        </h1>

        <form method="POST" class="space-y-5" enctype="multipart/form-data">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">제목</label>
                {{ form.title }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">내용</label>
                {{ form.content }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">이미지</label>
                {{ form.image }}
            </div>

            <div class="flex items-center gap-2">
                {{ form.is_public }}
                <label class="text-sm text-gray-600">공개 게시글</label>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-lg transition">
                    저장
                </button>
                <a href="{% url 'post_list' %}"
                   class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium px-6 py-2.5 rounded-lg transition">
                    취소
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
