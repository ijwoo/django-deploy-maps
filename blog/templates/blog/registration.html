{% extends 'blog/base.html' %}

{% block title %}회원가입{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">회원가입</h2>
            <p class="text-sm text-gray-500 mb-6">새 계정을 만들어보세요.</p>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition mt-2">
                    가입하기
                </button>
            </form>

            <p class="text-sm text-gray-500 text-center mt-5">
                이미 계정이 있으신가요?
                <a href="{% url 'login' %}" class="text-indigo-600 hover:underline font-medium">로그인</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
