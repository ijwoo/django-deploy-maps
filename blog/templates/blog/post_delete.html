{% extends 'blog/base.html' %}

{% block title %}게시글 삭제{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-900 mb-2">게시글 삭제</h1>
            <p class="text-gray-500 text-sm mb-8">
                <span class="font-medium text-gray-700">{{ post.title }}</span><br>
                이 게시글을 정말 삭제하시겠습니까? 되돌릴 수 없습니다.
            </p>
            <form method="post" class="flex justify-center gap-3">
                {% csrf_token %}
                <button type="submit"
                        class="bg-red-500 hover:bg-red-600 text-white font-medium px-6 py-2.5 rounded-lg transition">
                    삭제
                </button>
                <a href="{% url 'post_detail' pk=post.pk %}"
                   class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium px-6 py-2.5 rounded-lg transition">
                    취소
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
