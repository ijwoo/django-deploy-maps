{% extends 'blog/base.html' %}

{% block title %}로그인{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">로그인</h2>
            <p class="text-sm text-gray-500 mb-6">블로그 & 지도 서비스에 오신 걸 환영합니다.</p>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition mt-2">
                    로그인
                </button>
            </form>

            <p class="text-sm text-gray-500 text-center mt-5">
                계정이 없으신가요?
                <a href="{% url 'register' %}" class="text-indigo-600 hover:underline font-medium">회원가입</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
